{% extends 'base.html' %}
{% block content %}

<style>
/* --- CONTENEDOR GENERAL --- */
.contact-hero-section {
    padding-top: 140px;
    padding-bottom: 80px;
}

/* --- GRID PRINCIPAL --- */
.contact-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: start;
}

@media (max-width: 900px) {
    .contact-wrapper {
        grid-template-columns: 1fr;
    }
}

/* --- LADO IZQUIERDO (INFO) --- */
.contact-side-container p {
    font-size: 1.1rem;
    margin-bottom: 20px;
}

.contact-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.contact-list-item {
    display: flex;
    align-items: center;
    gap: 14px;
}

.contact-list-icon-wrapper {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.contact-links {
    color: #6c5ce7;
    font-weight: 600;
}

/* --- FORMULARIO --- */
.contact-form {
    display: grid;
    gap: 18px;
}

.contact-form label {
    font-weight: 600;
    margin-bottom: 4px;
    display: block;
}

.contact-form input,
.contact-form textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.15);
    font-size: 1rem;
}

.contact-form textarea {
    height: 140px;
    resize: none;
}

.primary-button {
    margin-top: 10px;
    width: 100%;
}

</style>


<section id="Contact" class="contact-hero-section">
    <div class="w-layout-blockcontainer container w-container">

        <h1 class="heading-h2 margin-bottom-32">Contact us</h1>

        <div class="contact-wrapper">

            <!-- ---------------- LADO IZQUIERDO ---------------- -->
            <div class="contact-side-container">
                <p class="paragraph-20">
                    Need help? Our support team is here to answer all your questions.
                </p>

                <div class="contact-list">

                    <div class="contact-list-item">
                        <div class="contact-list-icon-wrapper">
                            <div class="contact-list-icon w-embed">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M2 7L10.16 12.71c.66.46.99.69 1.35.78.32.08.65.08.97 0 .36-.09.69-.32 1.35-.78L22 7" />
                                    <path d="M6.8 20h10.4c1.68 0 2.52 0 3.16-.33.56-.29 1.02-.74 1.31-1.31C22 17.72 22 16.88 22 15.2V8.8c0-1.68 0-2.52-.33-3.16-.29-.56-.74-1.02-1.31-1.31C19.72 4 18.88 4 17.2 4H6.8C5.12 4 4.28 4 3.64 4.33c-.56.29-1.02.74-1.31 1.31C2 6.28 2 7.12 2 8.8v6.4c0 1.68 0 2.52.33 3.16.29.56.74 1.02 1.31 1.31C4.28 20 5.12 20 6.8 20Z"/>
                                </svg>
                            </div>
                        </div>
                        <a href="mailto:info@email.com" class="contact-links">info@email.com</a>
                    </div>

                    <div class="contact-list-item">
                        <div class="contact-list-icon-wrapper">
                            <div class="contact-list-icon w-embed">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M8.38 8.85c.7 1.45 1.65 2.81 2.85 4.01 1.2 1.2 2.56 2.15 4.01 2.85.12.06.18.09.26.11.28.08.62.02.86-.16.07-.05.13-.11.25-.23.35-.35.53-.53.7-.64.66-.43 1.51-.43 2.17 0 .17.11.35.29.7.64l.2.2c.53.53.8.8.94 1.09.28.57.28 1.24 0 1.81-.14.29-.41.56-.94 1.09l-.16.16c-.53.53-.8.8-1.09.94-.57.28-1.24.28-1.81 0-.29-.14-.56-.41-1.09-.94C13.3 20.06 10.43 18.43 8.04 16.05 5.66 13.66 4.03 10.79 3.17 7.76c-.16-.56-.24-.84-.24-1.26 0-.46.16-1.06.39-1.46.2-.36.47-.63.97-1.13l.16-.16c.53-.53.8-.8 1.09-.94.57-.28 1.24-.28 1.81 0 .29.14.56.41 1.09.94l.2.2c.35.35.53.53.64.7.43.66.43 1.51 0 2.17-.11.17-.29.35-.64.7l-.2.2c-.35.35-.53.53-.64.7-.17.26-.23.6-.15.88.02.08.05.14.11.26Z"/>
                                </svg>
                            </div>
                        </div>
                        <a href="#" class="contact-links">1.800.000.000</a>
                    </div>

                    <div class="contact-list-item">
                        <div class="contact-list-icon-wrapper">
                            <div class="contact-list-icon w-embed">
                                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 12.5c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3Z"/>
                                    <path d="M12 22c2-4 8-6.58 8-12 0-4.42-3.58-8-8-8S4 5.58 4 10c0 5.42 6 8 8 12Z"/>
                                </svg>
                            </div>
                        </div>
                        <a href="#" class="contact-links">123 Acme street</a>
                    </div>

                </div>
            </div>

            <!-- ---------------- FORMULARIO ---------------- -->
            <div>
                <form method="POST" class="contact-form">
                    {% csrf_token %}

                    <div>
                        <label>First Name *</label>
                        <input type="text" name="first_name" required>
                    </div>

                    <div>
                        <label>Last Name</label>
                        <input type="text" name="last_name">
                    </div>

                    <div>
                        <label>Email *</label>
                        <input type="email" name="email" required>
                    </div>

                    <div>
                        <label>Subject *</label>
                        <input type="text" name="subject" required>
                    </div>

                    <div>
                        <label>Message *</label>
                        <textarea name="message" required></textarea>
                    </div>

                    <button type="submit" class="primary-button w-button">Send Message</button>
                </form>
            </div>

        </div>
    </div>
</section>

{% endblock %}
