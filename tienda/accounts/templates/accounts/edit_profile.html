{% load static %}

<style>
    .edit-profile-wrapper {
        padding-top: 120px;
        padding-bottom: 60px;
        display: flex;
        justify-content: center;
        background-color: #f8f8f8;
    }

    .edit-profile-card {
        width: 100%;
        max-width: 600px;
        background: #fff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .edit-profile-card h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        font-weight: bold;
    }

    .profile-photo-wrapper {
        width: 150px;
        height: 150px;
        margin: 0 auto 20px auto;
        position: relative;
    }

    .profile-photo {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background-color: #ddd;
        background-size: cover;
        background-position: center;
        border: 3px solid #ccc;
    }

    .change-photo-btn {
        position: absolute;
        bottom: 0;
        right: 0;
        background-color: #007bff;
        color: #fff;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        cursor: pointer;
        border: 2px solid #fff;
    }

    .change-photo-input {
        display: none;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        font-weight: bold;
        display: block;
        margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    .save-btn {
        width: 100%;
        padding: 14px;
        background-color: #007bff;
        color: #fff;
        border-radius: 10px;
        border: none;
        font-size: 18px;
        cursor: pointer;
        margin-top: 10px;
    }

    .back-btn {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 16px;
    }
</style>


<div class="edit-profile-wrapper">
    <div class="edit-profile-card">

        <h1>Editar perfil</h1>

        <!-- FOTO DE PERFIL -->
        <div class="profile-photo-wrapper">
            <div class="profile-photo"
                 id="preview-photo"
                 {% if profile.photo %}
                     style="background-image: url('{{ profile.photo.url }}');"
                 {% endif %}>
            </div>

            <label class="change-photo-btn">
                +
                <input type="file" name="photo" id="photo-input" class="change-photo-input" accept="image/*">
            </label>
        </div>

        <!-- FORMULARIO -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Nombre de usuario</label>
                <input type="text" name="username" value="{{ user.username }}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ user.email }}">
            </div>

            <div class="form-group">
                <label>Biografía</label>
                <textarea name="bio" rows="4">Aquí tu biografía…</textarea>
            </div>

            <button type="submit" class="save-btn">Guardar cambios</button>
        </form>

        <a href="{% url 'profile' %}" class="back-btn">Volver al perfil</a>

    </div>
</div>

<!-- SCRIPT PARA PREVISUALIZAR LA FOTO -->
<script>
document.getElementById("photo-input").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (file) {
        const url = URL.createObjectURL(file);
        document.getElementById("preview-photo").style.backgroundImage = `url('${url}')`;
    }
});
</script>
