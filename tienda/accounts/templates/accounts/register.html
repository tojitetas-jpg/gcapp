{% extends 'base_auth.html' %}
{% load static %}

{% block content %}

<section id="Contact" class="login-section">

  <div class="login-container login-container-image">
    <div class="text-block-6">
      <em class="italic-text-2">GCApp</em>
    </div>
  </div>

  <div class="login-container w-form">
    <form method="post" class="login-form">
      {% csrf_token %}

      <div class="sign-up-card">
        <h1 class="heading-h3 margin-bottom-16 centered-text">Sign up</h1>

        {% if error %}
          <p style="color:red; text-align:center;">{{ error }}</p>
        {% endif %}

        <div class="sign-up-elements-grid">

          <div class="_100-width">
            <label class="field-label">First Name*</label>
            <input class="text-field w-input" type="text" name="username" placeholder="Name" required>
          </div>

          <div class="_100-width">
            <label class="field-label">Email Address *</label>
            <input class="text-field w-input" type="email" name="email" placeholder="Email Address" required>
          </div>

          <div class="_100-width">
            <label class="field-label">Password*</label>
            <input class="text-field w-input" type="password" name="password" placeholder="Password" required>
          </div>

          <div class="login-button-wrapper">
            <input type="submit" class="primary-button w-button" value="Sign up">
          </div>

          <p class="paragraph-18 centered-text">
            Already have an account?
            <a href="{% url 'login' %}" class="login-link">Log in here</a>
          </p>

        </div>
      </div>

    </form>
  </div>

</section>

{% endblock %}
